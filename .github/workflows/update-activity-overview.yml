name: Update activity overview

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate activity overview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Nik-Reddy
        run: python scripts/generate_activity_overview.py

      - name: Commit updated activity overview
        run: |
          git config user.name "Nik-Reddy"
          git config user.email "41942071+Nik-Reddy@users.noreply.github.com"
          git add assets/activity-overview.svg
          if git diff --cached --quiet; then
            echo "No activity overview changes to commit."
            exit 0
          fi
          git commit -m "Update activity overview"
          git push
