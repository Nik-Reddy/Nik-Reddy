  <circle class="marker" cx="180.0" cy="102.4" r="3.4" />
  <circle class="marker" cx="185.6" cy="108.0" r="3.4" />
  <circle class="marker" cx="180.0" cy="134.0" r="3.4" />
  <circle class="marker" cx="155.2" cy="108.0" r="3.4" />
  <circle class="marker" cx="180" cy="108" r="3.4" />
  <text class="label" x="180" y="18" text-anchor="middle">9%</text>
  <text class="label" x="180" y="32" text-anchor="middle">Code review</text>
